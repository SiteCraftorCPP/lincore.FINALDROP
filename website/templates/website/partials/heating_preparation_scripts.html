<script>
// Function to get CSRF token from cookies
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

// Global form submission handler
function submitQuoteForm(event) {
    event.preventDefault();
    const form = event.target;
    const formData = new FormData(form);

    // Ensure service_type is set correctly
    if (!formData.has('service_type')) {
        formData.append('service_type', 'heating_preparation_service');
    } else {
        formData.set('service_type', 'heating_preparation_service');
    }
            
    showNotification('Отправка запроса на коммерческое предложение...', 'info');
            
    fetch('/submit-request/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': csrftoken
        }
    })
    .then(response => {
        if (response.ok) {
            return response.json();
        } else {
            throw new Error('Ошибка сервера: ' + response.status);
        }
    })
    .then(data => {
        if (data.success) {
            showNotification('Запрос на коммерческое предложение отправлен!', 'success');
            closeQuoteModal();
            form.reset();
        } else {
            showNotification('Ошибка при отправке запроса: ' + (data.error || 'Неизвестная ошибка'), 'error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showNotification('Ошибка при отправке запроса. Попробуйте еще раз.', 'error');
    });
}


// Modal functionality
function openQuoteModal() {
    const modal = document.getElementById('quoteModal');
    if (modal) {
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
}

function closeQuoteModal() {
    const modal = document.getElementById('quoteModal');
    if (modal) {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
}

// Enhanced notification system (на мобилке — по центру, см. pageToastMob* в additionalCSS)
function showNotification(message, type = 'info') {
    const notification = document.createElement('div');
    notification.textContent = message;

    const bgColors = {
        'success': 'linear-gradient(135deg, #10b981, #059669)',
        'error': 'linear-gradient(135deg, #ef4444, #dc2626)',
        'info': 'linear-gradient(135deg, #3b82f6, #1d4ed8)',
        'warning': 'linear-gradient(135deg, #f59e0b, #d97706)'
    };
    const bg = bgColors[type] || bgColors.info;
    const narrow = window.matchMedia('(max-width: 768px)').matches;

    if (narrow) {
        notification.style.cssText = `
            position: fixed;
            top: max(88px, calc(env(safe-area-inset-top, 0px) + 72px));
            left: 50%;
            right: auto;
            transform: translateX(-50%);
            width: min(420px, calc(100vw - 24px));
            max-width: calc(100vw - 24px);
            box-sizing: border-box;
            background: ${bg};
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 10000;
            font-weight: 600;
            text-align: center;
            font-size: 15px;
            line-height: 1.35;
            animation: pageToastMobIn 0.35s ease-out forwards;
        `;
    } else {
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: ${bg};
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 10000;
            font-weight: 600;
            min-width: 250px;
            text-align: center;
            animation: slideInRight 0.3s ease-out;
        `;
    }

    document.body.appendChild(notification);

    setTimeout(() => {
        const out = narrow
            ? 'pageToastMobOut 0.3s ease-in forwards'
            : 'slideOutRight 0.3s ease-in forwards';
        notification.style.animation = out;
        setTimeout(() => {
            notification.remove();
        }, 300);
    }, 3000);
}

// Initialize everything when DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
    if (typeof AOS !== 'undefined') {
        AOS.init({
            duration: 800,
            easing: 'ease-out-cubic',
            once: true,
            offset: 100,
            disable: function () {
                return window.matchMedia('(max-width: 768px)').matches;
            }
        });
    }

    // The old submit handler is now removed. The submission is handled by the global `submitQuoteForm` function via the `onsubmit` attribute in the HTML.
    
    // Modal event listeners
    const quoteModal = document.getElementById('quoteModal');
    
    const additionalCSS = `
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        @keyframes pageToastMobIn {
            from {
                opacity: 0;
                transform: translate(-50%, -18px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes pageToastMobOut {
            from {
                opacity: 1;
                transform: translate(-50%, 0);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -18px);
            }
        }
    `;

    const styleSheet = document.createElement('style');
    styleSheet.type = 'text/css';
    styleSheet.innerText = additionalCSS;
    document.head.appendChild(styleSheet);

    const pills = document.querySelectorAll('.nav-pills-section .pill-btn');
    const progressFill = document.querySelector('.nav-pills-section .progress-fill');
    
    function updateProgress(activeIndex) {
        if (!progressFill || activeIndex < 0) return;
        const progress = ((activeIndex + 1) / pills.length) * 100;
        progressFill.style.width = `${progress}%`;
    }

    function headerScrollOffset() {
        const header = document.getElementById('header');
        return (header ? header.getBoundingClientRect().height : 72) + 16;
    }

    /** Прокрутка: подзаголовок секции оказывается сразу под фиксированной шапкой сайта */
    function scrollToPillTarget(href) {
        const targetEl = document.querySelector(href);
        if (!targetEl) return;
        const section = targetEl.closest('section') || targetEl;
        const alignEl = section.querySelector('.section-subtitle') || section.querySelector('.section-header') || section;
        const offset = headerScrollOffset();
        const top = alignEl.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }
    
    pills.forEach((pill) => {
        pill.addEventListener('click', function(e) {
            e.preventDefault();
            const href = this.getAttribute('href');
            if (href && href.startsWith('#')) {
                scrollToPillTarget(href);
            }
        });
    });

    const sections = document.querySelectorAll('.modern-service-page section[id]');
    
    function updateActiveSection() {
        let current = '';
        const scrollY = window.scrollY || document.documentElement.scrollTop;
        const trigger = headerScrollOffset() + 40;

        sections.forEach((section) => {
            const id = section.getAttribute('id');
            if (!id) return;
            const top = section.getBoundingClientRect().top + scrollY;
            if (scrollY + trigger >= top) {
                current = id;
            }
        });
        
        let activeIndex = -1;
        pills.forEach((pill, index) => {
            pill.classList.remove('active');
            if (pill.getAttribute('href') === '#' + current) {
                pill.classList.add('active');
                activeIndex = index;
            }
        });
        updateProgress(activeIndex);
    }
    
    window.addEventListener('scroll', updateActiveSection, { passive: true });
    window.addEventListener('resize', updateActiveSection);
    updateActiveSection();

    const hash = window.location.hash;
    if (hash && document.querySelector(hash)) {
        requestAnimationFrame(() => {
            scrollToPillTarget(hash);
            requestAnimationFrame(updateActiveSection);
        });
    }
});
</script>
