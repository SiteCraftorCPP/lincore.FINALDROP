<script>
// Function to get CSRF token from cookies
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

// Global form submission handler
function submitQuoteForm(event) {
    event.preventDefault();
    const form = event.target;
    if (typeof window.validateFormPhone === 'function' && !window.validateFormPhone(form)) {
        return;
    }
    const formData = new FormData(form);
    const ph = form.querySelector('input[name="phone"]');
    if (ph && typeof window.formatRuPhoneForStorage === 'function') {
        formData.set('phone', window.formatRuPhoneForStorage(ph.value));
    }

    // Ensure service_type is set correctly
    if (!formData.has('service_type')) {
        formData.append('service_type', 'heating_preparation_service');
    } else {
        formData.set('service_type', 'heating_preparation_service');
    }
            
    if (typeof window.showNotification === 'function') {
        window.showNotification('Отправка запроса...', 'info');
    }
            
    fetch('/submit-request/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': csrftoken
        }
    })
    .then(response => {
        if (response.ok) {
            return response.json();
        } else {
            throw new Error('Ошибка сервера: ' + response.status);
        }
    })
    .then(data => {
        if (data.success) {
            if (typeof window.ymReachGoal === 'function') {
                window.ymReachGoal('heating_preparation_quote');
            }
            if (typeof window.showNotification === 'function') {
                window.showNotification('Запрос на коммерческое предложение отправлен!', 'success');
            }
            closeQuoteModal();
            form.reset();
        } else {
            if (typeof window.showNotification === 'function') {
                window.showNotification('Ошибка: ' + (data.error || data.message || 'неизвестная'), 'error');
            }
        }
    })
    .catch(error => {
        console.error('Error:', error);
        if (typeof window.showNotification === 'function') {
            window.showNotification('Ошибка при отправке. Попробуйте ещё раз.', 'error');
        }
    });
}


// Modal functionality
function openQuoteModal() {
    const modal = document.getElementById('quoteModal');
    if (modal) {
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
}

function closeQuoteModal() {
    const modal = document.getElementById('quoteModal');
    if (modal) {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
}

// Уведомления: window.showNotification из static/js/main.js

// Initialize everything when DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
    if (typeof AOS !== 'undefined') {
        AOS.init({
            duration: 800,
            easing: 'ease-out-cubic',
            once: true,
            offset: 100,
            disable: function () {
                return window.matchMedia('(max-width: 768px)').matches;
            }
        });
    }

    // The old submit handler is now removed. The submission is handled by the global `submitQuoteForm` function via the `onsubmit` attribute in the HTML.
    
    // Modal event listeners
    const quoteModal = document.getElementById('quoteModal');
    
    const additionalCSS = `
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        @keyframes pageToastMobIn {
            from {
                opacity: 0;
                transform: translate(-50%, -18px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes pageToastMobOut {
            from {
                opacity: 1;
                transform: translate(-50%, 0);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -18px);
            }
        }
    `;

    const styleSheet = document.createElement('style');
    styleSheet.type = 'text/css';
    styleSheet.innerText = additionalCSS;
    document.head.appendChild(styleSheet);

    const pills = document.querySelectorAll('.nav-pills-section .pill-btn');
    const progressFill = document.querySelector('.nav-pills-section .progress-fill');
    
    function updateProgress(activeIndex) {
        if (!progressFill || activeIndex < 0) return;
        const progress = ((activeIndex + 1) / pills.length) * 100;
        progressFill.style.width = `${progress}%`;
    }

    function headerScrollOffsetPx() {
        const header = document.getElementById('header');
        const headerH = header ? header.getBoundingClientRect().height : 72;
        /* Чуть меньше запас, чтобы “не перелистывать” */
        return headerH + 8;
    }

    /** Прокрутка: начало секции сразу под фиксированной шапкой */
    function scrollToPillTarget(href) {
        const targetEl = document.querySelector(href);
        if (!targetEl) return;
        const section = targetEl.closest('section') || targetEl;
        const offset = headerScrollOffsetPx();
        const top = section.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }
    
    pills.forEach((pill) => {
        pill.addEventListener('click', function(e) {
            e.preventDefault();
            const href = this.getAttribute('href');
            if (href && href.startsWith('#')) {
                scrollToPillTarget(href);
            }
        });
    });

    const sections = document.querySelectorAll('.modern-service-page section[id]');
    
    function updateActiveSection() {
        let current = '';
        const scrollY = window.scrollY || document.documentElement.scrollTop;
        const trigger = headerScrollOffsetPx() + 12;

        sections.forEach((section) => {
            const id = section.getAttribute('id');
            if (!id) return;
            const top = section.getBoundingClientRect().top + scrollY;
            if (scrollY + trigger >= top) {
                current = id;
            }
        });
        
        let activeIndex = -1;
        pills.forEach((pill, index) => {
            pill.classList.remove('active');
            if (pill.getAttribute('href') === '#' + current) {
                pill.classList.add('active');
                activeIndex = index;
            }
        });
        updateProgress(activeIndex);
    }
    
    window.addEventListener('scroll', updateActiveSection, { passive: true });
    window.addEventListener('resize', updateActiveSection);
    updateActiveSection();

    const hash = window.location.hash;
    if (hash && document.querySelector(hash)) {
        requestAnimationFrame(() => {
            scrollToPillTarget(hash);
            requestAnimationFrame(updateActiveSection);
        });
    }
});
</script>
