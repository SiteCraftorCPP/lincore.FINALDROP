<script>
document.addEventListener('DOMContentLoaded', function() {
    function copyEmailToClipboard(email, triggerEl) {
        function done(ok) {
            if (triggerEl) {
                triggerEl.classList.toggle('is-copied', ok);
                if (ok) setTimeout(function() { triggerEl.classList.remove('is-copied'); }, 2000);
                if (ok && triggerEl.classList.contains('js-copy-email-mobile')) {
                    var sub = triggerEl.querySelector('.mobile-menu-quick__sub');
                    if (sub) {
                        var prev = sub.textContent;
                        sub.textContent = 'Скопировано в буфер обмена';
                        setTimeout(function() { sub.textContent = prev; }, 2200);
                    }
                }
            }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(email).then(function() { done(true); }).catch(function() { fallback(); });
        } else {
            fallback();
        }
        function fallback() {
            try {
                var ta = document.createElement('textarea');
                ta.value = email;
                ta.setAttribute('readonly', '');
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                done(true);
            } catch (e) {
                done(false);
            }
        }
    }

    document.querySelectorAll('.header-email-copy__btn[data-copy-email], .audit-email-btn[data-copy-email]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            copyEmailToClipboard(btn.getAttribute('data-copy-email') || '', btn);
        });
    });

    document.querySelectorAll('.js-copy-email-mobile[data-copy-email]').forEach(function(el) {
        el.addEventListener('click', function() {
            copyEmailToClipboard(el.getAttribute('data-copy-email') || '', el);
        });
    });

    // Initialize AOS
    if (typeof AOS !== 'undefined') {
        AOS.init({
            duration: 800,
            easing: 'ease-out-cubic',
            once: true,
            offset: 100,
            disable: function () {
                return window.matchMedia('(max-width: 768px)').matches;
            }
        });
    }

    // Parallax effect for hero section
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        const parallaxElements = document.querySelectorAll('.hero-particles, .hero-gradient');
        
        parallaxElements.forEach(element => {
            const speed = 0.5;
            element.style.transform = `translateY(${scrolled * speed}px)`;
        });
    });

    // Counter animation for hero stats
    function animateCounters() {
        const counters = document.querySelectorAll('[data-count]');
        counters.forEach(counter => {
            const target = parseInt(counter.dataset.count);
            const duration = 2000;
            animateNumber(counter, 0, target, duration);
        });
    }
    
    function animateNumber(element, start, end, duration) {
        const startTime = performance.now();
        
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const current = Math.floor(start + (end - start) * progress);
            element.textContent = current;
            
            if (progress < 1) {
                requestAnimationFrame(update);
            }
        }
        requestAnimationFrame(update);
    }
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                animateCounters();
                observer.disconnect();
            }
        });
    });
    
    const statsSection = document.querySelector('.hero-stats');
    if (statsSection) {
        observer.observe(statsSection);
    }

    // Navigation Pills functionality
    const pills = document.querySelectorAll('.pill-btn');
    const progressFill = document.querySelector('.progress-fill');
    
    function headerScrollOffsetPx() {
        const header = document.getElementById('header');
        const headerH = header ? header.getBoundingClientRect().height : 72;
        return headerH + 8;
    }

    function scrollToSectionTop(sectionEl) {
        const offset = headerScrollOffsetPx();
        const top = sectionEl.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }

    function updateProgress(activeIndex) {
        const progress = ((activeIndex + 1) / pills.length) * 100;
        if (progressFill) {
            progressFill.style.width = `${progress}%`;
        }
    }
    
    pills.forEach((pill, index) => {
        pill.addEventListener('click', function() {
            pills.forEach(p => p.classList.remove('active'));
            this.classList.add('active');
            updateProgress(index);
            
            const target = this.dataset.target;
            const targetElement = document.getElementById(target);
            
            if (targetElement) {
                scrollToSectionTop(targetElement);
            }
        });
    });

    // MEGA Service Cards Enhanced Effects
    const megaServiceCards = document.querySelectorAll('.mega-service-card');
    
    megaServiceCards.forEach((card, index) => {
        card.addEventListener('mouseenter', function() {
            const particles = this.querySelector('.icon-particles');
            const glow = this.querySelector('.mega-card-glow');
            const icon = this.querySelector('.mega-icon');
            
            if (particles) {
                particles.style.opacity = '1';
            }
            
            if (glow) {
                glow.style.opacity = '1';
                glow.style.transform = 'scale(1.2)';
            }
            
            if (icon) {
                icon.style.transform = 'scale(1.3) rotate(20deg)';
                icon.style.filter = 'brightness(1.3) drop-shadow(0 0 20px rgba(255,255,255,0.8))';
            }
            
            const badge = this.querySelector('.card-badge');
            if (badge) {
                badge.style.animation = 'shake 0.5s ease-in-out';
            }
        });
        
        card.addEventListener('mouseleave', function() {
            const particles = this.querySelector('.icon-particles');
            const glow = this.querySelector('.mega-card-glow');
            const icon = this.querySelector('.mega-icon');
            
            if (particles) {
                particles.style.opacity = '0';
                particles.style.animation = '';
            }
            
            if (glow) {
                glow.style.opacity = '0';
                glow.style.transform = 'scale(1)';
            }
            
            if (icon) {
                icon.style.transform = '';
                icon.style.filter = '';
            }
        });
        
        card.addEventListener('click', function() {
            this.style.transform = 'translateY(-15px) scale(0.98)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
        });
    });

    // Interactive Why Cards - 3D Flip Effects
    const whyCards = document.querySelectorAll('.interactive-why-card');
    
    whyCards.forEach(card => {
        let isFlipped = false;
        
        card.addEventListener('click', function() {
            isFlipped = !isFlipped;
            
            if (isFlipped) {
                this.querySelector('.why-card-front').style.transform = 'rotateY(180deg)';
                this.querySelector('.why-card-back').style.transform = 'rotateY(0deg)';
            } else {
                this.querySelector('.why-card-front').style.transform = 'rotateY(0deg)';
                this.querySelector('.why-card-back').style.transform = 'rotateY(-180deg)';
            }
        });
        
        card.addEventListener('mouseenter', function() {
            if (!isFlipped) {
                this.querySelector('.why-card-front').style.transform = 'rotateY(180deg)';
                this.querySelector('.why-card-back').style.transform = 'rotateY(0deg)';
            }
        });
        
        card.addEventListener('mouseleave', function() {
            if (!isFlipped) {
                setTimeout(() => {
                    this.querySelector('.why-card-front').style.transform = 'rotateY(0deg)';
                    this.querySelector('.why-card-back').style.transform = 'rotateY(-180deg)';
                }, 2000);
            }
        });
    });

    // Documents Showcase Interactive Navigation
    const documentCards = document.querySelectorAll('.document-card');
    const navDots = document.querySelectorAll('.nav-dot');
    
    let currentDoc = 1;
    let autoSlideInterval;
    
    function showDocument(docNumber) {
        documentCards.forEach(card => card.classList.remove('active-doc'));
        navDots.forEach(dot => dot.classList.remove('active'));
        
        const activeCard = document.querySelector(`[data-doc="${docNumber}"]`);
        const activeDot = document.querySelector(`[data-target="${docNumber}"]`);
        
        if (activeCard) {
            activeCard.classList.add('active-doc');
            activeCard.style.zIndex = '100';
            
            documentCards.forEach((card, index) => {
                if (card !== activeCard) {
                    card.style.zIndex = 50 - index;
                }
            });
        }
        
        if (activeDot) {
            activeDot.classList.add('active');
        }
        
        currentDoc = docNumber;
        
        const docTitle = activeCard ? activeCard.querySelector('h4').textContent : 'Документ';
        showFloatingMessage(`Документ: ${docTitle}`, activeCard);
    }
    
    navDots.forEach(dot => {
        dot.addEventListener('click', function() {
            const targetDoc = parseInt(this.dataset.target);
            showDocument(targetDoc);
            
            clearInterval(autoSlideInterval);
            startAutoSlide();
        });
    });
    
    function startAutoSlide() {
        autoSlideInterval = setInterval(() => {
            currentDoc = currentDoc >= 5 ? 1 : currentDoc + 1;
            showDocument(currentDoc);
        }, 4000);
    }
    
    const documentsObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                startAutoSlide();
            } else {
                clearInterval(autoSlideInterval);
            }
        });
    }, { threshold: 0.5 });
    
    const documentsSection = document.querySelector('.documents-section');
    if (documentsSection) {
        documentsObserver.observe(documentsSection);
    }

    // Masonry Advantages Enhanced Interactions
    const masonryCards = document.querySelectorAll('.masonry-advantage-card');
    
    masonryCards.forEach((card, index) => {
        card.addEventListener('mouseenter', function() {
            const dots = this.querySelectorAll('.floating-dot');
            dots.forEach((dot, i) => {
                dot.style.animationPlayState = 'paused';
                dot.style.transform = `translateY(-${20 + i * 5}px) scale(1.5)`;
                dot.style.background = '#0ea5e9';
                dot.style.boxShadow = '0 0 15px rgba(14, 165, 233, 0.8)';
            });
            
            const icon = this.querySelector('.mega-emoji');
            if (icon) {
                icon.style.animation = 'none';
                icon.style.transform = 'scale(1.4) rotate(15deg)';
                icon.style.filter = 'brightness(1.4) drop-shadow(0 0 25px rgba(255,255,255,0.9))';
            }
            
            const indicatorBar = this.querySelector('.indicator-bar');
            if (indicatorBar) {
                indicatorBar.style.width = '60px';
                indicatorBar.style.background = 'linear-gradient(90deg, #0ea5e9, #60a5fa)';
            }
        });
        
        card.addEventListener('mouseleave', function() {
            const dots = this.querySelectorAll('.floating-dot');
            dots.forEach(dot => {
                dot.style.animationPlayState = 'running';
                dot.style.transform = '';
                dot.style.background = '';
                dot.style.boxShadow = '';
            });
            
            const icon = this.querySelector('.mega-emoji');
            if (icon) {
                icon.style.animation = '';
                icon.style.transform = '';
                icon.style.filter = '';
            }
            
            const indicatorBar = this.querySelector('.indicator-bar');
            if (indicatorBar) {
                indicatorBar.style.width = '';
                indicatorBar.style.background = '';
            }
        });
    });

    // Enhanced icon animations
    const animatedIcons = document.querySelectorAll('[class*="animate-"]');
    
    animatedIcons.forEach(icon => {
        if (icon.closest('.masonry-advantage-card')) return;
        icon.addEventListener('click', function() {
            this.style.animation = 'none';
            this.style.transform = 'scale(1.5) rotate(720deg)';
            this.style.filter = 'brightness(2) drop-shadow(0 0 30px #0ea5e9)';
            
            setTimeout(() => {
                this.style.animation = '';
                this.style.transform = '';
                this.style.filter = '';
            }, 1000);
        });
        
        icon.addEventListener('mouseenter', function() {
            this.style.animationPlayState = 'paused';
            this.style.transform = 'scale(1.3) rotate(15deg)';
            this.style.filter = 'brightness(1.3) drop-shadow(0 0 20px rgba(14, 165, 233, 0.6))';
        });
        
        icon.addEventListener('mouseleave', function() {
            this.style.animationPlayState = 'running';
            this.style.transform = '';
            this.style.filter = '';
        });
    });

    // Enhanced CTA section interactions
    const ctaButtons = document.querySelectorAll('.btn-cta-primary, .btn-cta-secondary');
    
    ctaButtons.forEach(button => {
        button.addEventListener('mouseenter', function() {
            this.style.transform = 'translateY(-5px) scale(1.05)';
            this.style.boxShadow = '0 20px 40px rgba(14, 165, 233, 0.4)';
            createRipple(this);
        });
        
        button.addEventListener('mouseleave', function() {
            this.style.transform = '';
            this.style.boxShadow = '';
        });
    });

    // Audit icon special effects
    const auditIcon = document.querySelector('.audit-icon');
    
    if (auditIcon) {
        auditIcon.addEventListener('click', function() {
            this.style.animation = 'none';
            this.style.transform = 'scale(2) rotate(1080deg)';
            this.style.filter = 'brightness(3) drop-shadow(0 0 40px #0ea5e9)';
            
            createExplosionEffect(this);
            
            setTimeout(() => {
                this.style.animation = '';
                this.style.transform = '';
                this.style.filter = '';
            }, 2000);
        });
    }

    // Government phone enhanced interaction
    const governmentPhone = document.querySelector('.government-phone');
    
    if (governmentPhone) {
        governmentPhone.addEventListener('click', function(e) {
            e.preventDefault();
            
            this.style.animation = 'phoneRing 0.5s ease-in-out 3';
            
            showEnhancedNotification('Соединяем с отделом госзаказчиков…', 'info');
            
            setTimeout(() => {
                this.style.animation = '';
                window.location.href = this.href;
            }, 1500);
        });
    }

    // Тост смены документа: в body, по центру снизу — не обрезается overflow карточек
    function showFloatingMessage(text, element) {
        const message = document.createElement('div');
        message.className = 'audit-doc-toast';
        message.setAttribute('role', 'status');
        message.textContent = text;
        document.body.appendChild(message);
        setTimeout(function() {
            if (message.parentNode) message.remove();
        }, 2000);
    }

    // Ripple effect creator
    function createRipple(element) {
        const ripple = document.createElement('div');
        ripple.style.cssText = `
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        `;
        
        element.style.position = 'relative';
        element.style.overflow = 'hidden';
        element.appendChild(ripple);
        
        setTimeout(() => ripple.remove(), 600);
    }

    // Explosion effect for special interactions
    function createExplosionEffect(element) {
        for (let i = 0; i < 12; i++) {
            const particle = document.createElement('div');
            particle.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                width: 4px;
                height: 4px;
                background: #0ea5e9;
                border-radius: 50%;
                transform: translate(-50%, -50%);
                animation: explode-${i} 1s ease-out forwards;
                pointer-events: none;
            `;
            
            element.style.position = 'relative';
            element.appendChild(particle);
            
            setTimeout(() => particle.remove(), 1000);
        }
    }

    // Add custom CSS animations
    const style = document.createElement('style');
    style.textContent = `
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }
        
        @keyframes phoneRing {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            75% { transform: scale(1.1) rotate(5deg); }
        }
        
        @keyframes rippleEffect {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 200px; height: 200px; opacity: 0; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        @keyframes slideInScale {
            from { transform: scale(0.7) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
    `;
    
    for (let i = 0; i < 12; i++) {
        const angle = (i * 30) * (Math.PI / 180);
        const distance = 50;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;
        
        style.textContent += `
            @keyframes explode-${i} {
                0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
                100% { transform: translate(-50%, -50%) translate(${x}px, ${y}px) scale(0); opacity: 0; }
            }
        `;
    }
    
    document.head.appendChild(style);
});

function ensureAuditEnhancedNotificationStyles() {
    if (document.getElementById('audit-enhanced-notification-styles')) return;
    const style = document.createElement('style');
    style.id = 'audit-enhanced-notification-styles';
    style.textContent = `
        .enhanced-notification {
            position: fixed;
            z-index: 10001;
            box-sizing: border-box;
            color: #fff;
            padding: 16px 18px;
            border-radius: 14px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.22);
            cursor: pointer;
            overflow: hidden;
            max-width: min(400px, calc(100vw - 32px));
            min-width: 0;
            width: auto;
            top: max(20px, env(safe-area-inset-top, 0px));
            right: max(16px, env(safe-area-inset-right, 0px));
            left: auto;
            animation: auditNotifSlideIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @media (max-width: 768px) {
            .enhanced-notification {
                left: max(12px, env(safe-area-inset-left, 0px));
                right: max(12px, env(safe-area-inset-right, 0px));
                max-width: none;
                width: auto;
                padding: 14px 16px;
                top: max(92px, calc(env(safe-area-inset-top, 0px) + 80px));
                animation: auditNotifMobIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            }
        }
        @media (max-width: 480px) {
            .enhanced-notification {
                top: max(88px, calc(env(safe-area-inset-top, 0px) + 76px));
                padding: 12px 14px;
                border-radius: 12px;
            }
            .enhanced-notification .notification-content {
                gap: 10px;
                align-items: flex-start;
            }
            .enhanced-notification .notification-icon {
                font-size: 20px;
                flex-shrink: 0;
                margin-top: 2px;
            }
            .enhanced-notification .notification-text {
                font-size: 14px;
                min-width: 0;
            }
            .enhanced-notification .notification-close {
                padding: 2px 4px;
                flex-shrink: 0;
            }
        }
        .enhanced-notification .notification-content {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
        }
        .enhanced-notification .notification-icon {
            font-size: 24px;
            flex-shrink: 0;
            animation: auditNotifIconBounce 0.6s ease-out;
        }
        .enhanced-notification .notification-text {
            flex: 1;
            min-width: 0;
            font-weight: 600;
            line-height: 1.45;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }
        .enhanced-notification .notification-close {
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            opacity: 0.75;
            transition: opacity 0.2s ease;
            padding: 4px;
            flex-shrink: 0;
        }
        .enhanced-notification .notification-close:hover {
            opacity: 1;
        }
        .enhanced-notification .notification-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.35);
            width: 100%;
            animation: auditNotifProgress 5s linear forwards;
        }
        @keyframes auditNotifSlideIn {
            from { transform: translateX(calc(100% + 24px)); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes auditNotifSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(calc(100% + 24px)); opacity: 0; }
        }
        @keyframes auditNotifMobIn {
            from { opacity: 0; transform: translateY(-14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes auditNotifMobOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-12px); }
        }
        @keyframes auditNotifIconBounce {
            0%, 20%, 50%, 80%, 100% { transform: scale(1); }
            40% { transform: scale(1.15); }
            60% { transform: scale(1.05); }
        }
        @keyframes auditNotifProgress {
            from { width: 100%; }
            to { width: 0%; }
        }
    `;
    document.head.appendChild(style);
}

// Enhanced notification system (адаптивно, без min-width; один раз стили в head)
function showEnhancedNotification(message, type = 'info') {
    ensureAuditEnhancedNotificationStyles();

    const notification = document.createElement('div');
    notification.className = 'enhanced-notification notification-' + type;

    const icons = {
        'success': 'OK',
        'info': 'i',
        'warning': '!',
        'error': '×'
    };

    const colors = {
        'success': 'linear-gradient(135deg, #10b981, #059669)',
        'info': 'linear-gradient(135deg, #0ea5e9, #0369a1)',
        'warning': 'linear-gradient(135deg, #f59e0b, #d97706)',
        'error': 'linear-gradient(135deg, #ef4444, #dc2626)'
    };

    notification.innerHTML =
        '<div class="notification-content">' +
            '<div class="notification-icon">' + icons[type] + '</div>' +
            '<div class="notification-text"></div>' +
            '<div class="notification-close" aria-label="Закрыть">&times;</div>' +
        '</div>' +
        '<div class="notification-progress"></div>';

    notification.querySelector('.notification-text').textContent = message;
    notification.style.background = colors[type];

    document.body.appendChild(notification);
    
    const autoRemoveTimeout = setTimeout(() => {
        removeNotification();
    }, 5000);
    
    function removeNotification() {
        clearTimeout(autoRemoveTimeout);
        const out = window.matchMedia('(max-width: 768px)').matches
            ? 'auditNotifMobOut 0.45s ease-out forwards'
            : 'auditNotifSlideOut 0.45s ease-out forwards';
        notification.style.animation = out;
        setTimeout(function() {
            if (notification.parentNode) {
                notification.remove();
            }
        }, 450);
    }

    notification.querySelector('.notification-close').addEventListener('click', function(e) {
        e.stopPropagation();
        removeNotification();
    });

    notification.addEventListener('click', function(e) {
        if (e.target.closest('.notification-close')) return;
        removeNotification();
    });
    
    notification.addEventListener('mouseenter', () => {
        clearTimeout(autoRemoveTimeout);
        notification.querySelector('.notification-progress').style.animationPlayState = 'paused';
    });
    
    notification.addEventListener('mouseleave', () => {
        notification.querySelector('.notification-progress').style.animationPlayState = 'running';
        setTimeout(removeNotification, 2000);
    });
}

// Government-specific functions
function downloadForm(docType) {
    showEnhancedNotification('Подготавливаем форму заявки…', 'info');
    
    setTimeout(() => {
        showEnhancedNotification('Форма заявки успешно скачана.', 'success');
    }, 1500);
}

function requestQuote() {
    showEnhancedNotification('Отправляем запрос коммерческого предложения…', 'info');
    
    setTimeout(() => {
        showEnhancedNotification('Запрос КП отправлен. Мы свяжемся с вами в течение 2 часов.', 'success');
    }, 2000);
}

// Add advanced scroll effects
window.addEventListener('scroll', () => {
    const scrolled = window.pageYOffset;
    const rate = scrolled * -0.5;
    
    const bgElements = document.querySelectorAll('.advantage-background-effect, .mega-card-glow');
    bgElements.forEach(element => {
        element.style.transform = `translateY(${rate}px)`;
    });
    
    const sectionIcons = document.querySelectorAll('.section-icon .icon');
    sectionIcons.forEach(icon => {
        const rect = icon.getBoundingClientRect();
        const inView = rect.top < window.innerHeight && rect.bottom > 0;
        
        if (inView) {
            const progress = (window.innerHeight - rect.top) / window.innerHeight;
            const scale = 0.8 + (progress * 0.4);
            icon.style.transform = `scale(${Math.min(scale, 1.2)})`;
        }
    });
});

    document.getElementById('quoteModal').style.display = 'none';

// Обработка отправки формы
document.getElementById('quoteForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (typeof window.validateFormPhone === 'function' && !window.validateFormPhone(this)) {
        return;
    }
    
    const formData = new FormData(this);
    const pq = this.querySelector('input[name="phone"]');
    if (pq && typeof window.formatRuPhoneForStorage === 'function') {
        formData.set('phone', window.formatRuPhoneForStorage(pq.value));
    }
    
    fetch('/submit-quote/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            if (typeof window.ymReachGoal === 'function') {
                window.ymReachGoal('audit_quote');
            }
            if (typeof window.showNotification === 'function') {
                window.showNotification('Заявка отправлена! Мы свяжемся с вами в ближайшее время.', 'success');
            }
            closeQuoteModal();
            this.reset();
        } else {
            if (typeof window.showNotification === 'function') {
                window.showNotification(data.message || 'Ошибка при отправке. Попробуйте ещё раз.', 'error');
            }
        }
    })
    .catch(error => {
        console.error('Error:', error);
        if (typeof window.showNotification === 'function') {
            window.showNotification('Ошибка при отправке. Попробуйте ещё раз.', 'error');
        }
    });
});

// Функции для галереи
let currentSlideIndex = 0;

function changeSlide(sliderId, direction) {
    const slider = document.getElementById(sliderId);
    const slides = slider.querySelectorAll('.gallery-slide');
    const dots = document.querySelectorAll('.gallery-dots .dot');
    
    if (slides.length === 0) return;
    
    // Убираем активный класс с текущего слайда
    slides[currentSlideIndex].classList.remove('active');
    dots[currentSlideIndex].classList.remove('active');
    
    // Вычисляем новый индекс
    currentSlideIndex += direction;
    
    // Проверяем границы
    if (currentSlideIndex >= slides.length) {
        currentSlideIndex = 0;
    } else if (currentSlideIndex < 0) {
        currentSlideIndex = slides.length - 1;
    }
    
    // Добавляем активный класс к новому слайду
    slides[currentSlideIndex].classList.add('active');
    dots[currentSlideIndex].classList.add('active');
}

function currentSlide(sliderId, slideNumber) {
    const slider = document.getElementById(sliderId);
    const slides = slider.querySelectorAll('.gallery-slide');
    const dots = document.querySelectorAll('.gallery-dots .dot');
    
    if (slides.length === 0) return;
    
    // Убираем активный класс со всех слайдов
    slides.forEach(slide => slide.classList.remove('active'));
    dots.forEach(dot => dot.classList.remove('active'));
    
    // Устанавливаем новый активный слайд
    currentSlideIndex = slideNumber - 1;
    slides[currentSlideIndex].classList.add('active');
    dots[currentSlideIndex].classList.add('active');
}

// Автоматическая смена слайдов
function startAutoSlide(sliderId) {
    setInterval(() => {
        changeSlide(sliderId, 1);
    }, 5000); // Меняем слайд каждые 5 секунд
}

// Инициализация галереи при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
    const auditGallery = document.getElementById('auditGallerySlider');
    if (auditGallery) {
        startAutoSlide('auditGallerySlider');
    }
});
