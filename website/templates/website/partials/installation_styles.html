<style>
/* Modern Installation Service Page Styles */

/* Modern Hero Section */
.modern-hero-section {
    position: relative;
    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 25%, #6d28d9 75%, #5b21b6 100%);
    overflow: hidden;
    padding: 0 0 100px;
}

.hero-gradient {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(196, 181, 253, 0.3) 0%, transparent 50%);
}

@keyframes gradientShift {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.1); }
}

.hero-particles {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 90px 40px, rgba(255, 255, 255, 0.4), transparent),
        radial-gradient(1px 1px at 130px 80px, rgba(255, 255, 255, 0.3), transparent);
    background-repeat: repeat;
    background-size: 150px 100px;
}

@keyframes particleFloat {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-100px); }
}

.hero-content-wrapper {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 16px 32px;
    border-radius: 50px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    margin-top: 12px !important;
    margin-bottom: 40px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
}

@keyframes badgePulse {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    50% {
        transform: scale(1.05);
        box-shadow: 0 12px 40px rgba(139, 92, 246, 0.3);
    }
}

.hero-badge:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.2);
}

.badge-icon {
    font-size: 20px;
}

@keyframes toolRotate {
    0%, 100% {
        transform: scale(1) rotate(0deg);
        filter: brightness(1);
    }
    25% {
        transform: scale(1.1) rotate(-10deg);
        filter: brightness(1.3);
    }
    50% {
        transform: scale(1.2) rotate(0deg);
        filter: brightness(1.5);
    }
    75% {
        transform: scale(1.1) rotate(10deg);
        filter: brightness(1.2);
    }
}

.hero-title {
    font-size: clamp(2.5rem, 5vw, 4rem) !important;
    font-weight: 800 !important;
    line-height: 1.2 !important;
    margin-bottom: 30px !important;
    color: white !important;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.title-main {
    display: block;
    margin-bottom: 10px;
}

.title-accent {
    display: block;
    color: white !important;
}

.hero-description {
    font-size: 1.25rem;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 30px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
}

.hero-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.stat-item {
    text-align: center;
    color: white;
}

.stat-number {
    font-size: 3rem;
    font-weight: 800;
    color: white;
    display: block;
    line-height: 1;
}

.stat-label {
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.8);
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.hero-actions {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 40px;
    flex-wrap: wrap;
}

.btn-modern {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.btn-modern::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}

.btn-modern:hover::before {
    left: 100%;
}

.btn-modern.btn-primary {
    background: white;
    color: #8b5cf6;
    border: 2px solid white;
}

.btn-modern.btn-primary:hover {
    background: #5b21b6;
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(91, 33, 182, 0.4);
}

.btn-modern.btn-secondary {
    background: transparent;
    color: white;
    border: 2px solid rgba(255, 255, 255, 0.5);
}

.btn-modern.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: white;
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2);
}

.btn-icon {
    transition: transform 0.3s ease;
}

.btn-modern:hover .btn-icon {
    transform: translateX(5px);
}

.scroll-indicator {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    text-align: center;
    font-size: 14px;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
    40% { transform: translateX(-50%) translateY(-10px); }
    60% { transform: translateX(-50%) translateY(-5px); }
}

.scroll-mouse {
    width: 25px;
    height: 40px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 15px;
    margin: 0 auto 10px;
    position: relative;
}

.scroll-wheel {
    width: 3px;
    height: 6px;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 2px;
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
}

@keyframes scroll {
    0% { opacity: 1; top: 8px; }
    100% { opacity: 0; top: 24px; }
}

/* Navigation Pills */
.nav-pills-section {
    position: relative !important;
    top: auto !important;
    z-index: auto !important;
    border: none;
    box-shadow: none;
    /* Цвета навигации для монтажа */
    --nav-pills-bg: #f9fafb;
    --nav-pill-bg: #ffffff;
    --nav-pill-border: rgba(139, 92, 246, 0.22);
    --nav-pill-text: #4c1d95;
    --nav-accent: #8b5cf6;
    --nav-accent-text: #ffffff;
    --nav-accent-shadow: rgba(139, 92, 246, 0.28);
    --nav-progress: linear-gradient(90deg, #8b5cf6, #5b21b6);
    /* Hover как у кнопки "Оставить заявку" (однотонный) */
    --nav-pill-hover-bg: #5b21b6;
}

/* Section Styles */
.section-header {
    text-align: center;
    margin-bottom: 60px;
}

.section-icon {
    margin-bottom: 20px;
}

.icon-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #8b5cf6, #5b21b6);
    border-radius: 50%;
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
}

.icon-wrapper .icon {
    font-size: 36px;
    color: white;
}

.section-title {
    font-size: 2.5rem;
    font-weight: 800;
    color: #1f2937;
    margin-bottom: 15px;
    line-height: 1.2;
}

.section-subtitle {
    font-size: 1.25rem;
    color: #6b7280;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
}

/* About Section */
.about-section {
    padding: 80px 0;
    background: #f9fafb;
}

.intro-content {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    max-width: 800px;
    margin: 0 auto;
}

.intro-text {
    font-size: 1.25rem;
    line-height: 1.8;
    color: #374151;
    text-align: center;
    margin: 0;
}

/* Services Section */
.services-section {
    padding: 80px 0;
    background: white;
}

.services-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 30px;
    margin-top: 60px;
}

.service-card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
}

.service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #8b5cf6, #5b21b6);
    transform: scaleX(0);
    transition: transform 0.3s ease;
}

.service-card:hover::before {
    transform: scaleX(1);
}

.service-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    border-color: #8b5cf6;
}

.card-header {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.card-icon {
    margin-bottom: 15px;
    order: 1;
}

.card-title {
    order: 2;
}

.icon-emoji {
    font-size: 48px;
    display: block;
    transition: all 0.3s ease;
}

.service-card:hover .icon-emoji {
    transform: scale(1.1);
}

.card-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1f2937;
    margin: 0;
    line-height: 1.3;
}

.card-content ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.card-content li {
    padding: 8px 0;
    color: #4b5563;
    line-height: 1.6;
    position: relative;
    padding-left: 25px;
}

.card-content li::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 0.65em;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #8b5cf6;
}

/* Process Section */
.process-section {
    padding: 56px 0;
    background: #f9fafb;
    overflow-x: hidden;
}

.process-section-cta {
    display: flex;
    justify-content: center;
    margin-top: 48px;
    padding-top: 8px;
}

/* Без transition:all и без overflow:hidden — иначе при hover «белеют» края; фон/бордер не анимируем */
.process-section-cta .btn-modern {
    overflow: visible;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
}

/* Кнопка на светлом фоне: базовый .btn-primary для героя — белая; здесь — заливка бренда */
.process-section-cta .btn-modern.btn-primary {
    background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 50%, #5b21b6 100%);
    color: #fff;
    border: 2px solid rgba(91, 33, 182, 0.35);
    box-shadow: 0 8px 28px rgba(91, 33, 182, 0.28);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.process-section-cta .btn-modern.btn-primary:hover {
    background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 50%, #4c1d95 100%);
    color: #fff;
    border-color: rgba(76, 29, 149, 0.55);
    transform: translate3d(0, -3px, 0);
    box-shadow: 0 14px 36px rgba(91, 33, 182, 0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Белая «волна» ::before — полностью отключаем */
.process-section-cta .btn-modern::before,
.process-section-cta .btn-modern:hover::before {
    content: none;
    display: none;
}

/* Блок этапов по центру; без position:left — сдвиг вправо давал обрезку текста на мобилке */
.process-section .process-steps {
    width: 100%;
    max-width: 42rem;
    margin: 2.75rem auto 0;
    padding: 0;
    box-sizing: border-box;
    position: relative;
    left: 0;
}

.process-section .process-steps__body {
    min-width: 0;
    overflow-wrap: break-word;
    word-wrap: break-word;
}

.process-section .process-steps__row {
    display: grid;
    grid-template-columns: 2.75rem minmax(0, 1fr);
    gap: 1rem 1.25rem;
    align-items: start;
    margin: 0;
    padding: 1.15rem 0;
    border-bottom: 1px solid #e5e7eb;
}

.process-section .process-steps__row:first-child {
    padding-top: 0;
}

.process-section .process-steps__row:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.process-section .process-steps__index {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.75rem;
    height: 2.75rem;
    margin-top: 2px;
    border-radius: 50%;
    font-size: 0.875rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #5b21b6;
    background: #ede9fe;
    border: 1px solid rgba(91, 33, 182, 0.12);
}

.process-section .process-steps__title {
    margin: 0 0 0.5rem;
    font-size: 1.1875rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.38;
    color: #111827;
}

.process-section .process-steps__list {
    margin: 0;
    padding: 0;
    list-style: none;
}

.process-section .process-steps__list li {
    position: relative;
    margin: 0 0 0.4rem;
    padding-left: 1rem;
    font-size: 1.0625rem;
    line-height: 1.58;
    color: #4b5563;
}

.process-section .process-steps__list li:last-child {
    margin-bottom: 0;
}

.process-section .process-steps__list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.58em;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #8b5cf6;
}

/* Advantages Section */
.advantages-section {
    padding: 80px 0;
    background: white;
}

.advantages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    margin-top: 60px;
}

.advantage-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    border: 2px solid transparent;
}

.advantage-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    border-color: #8b5cf6;
}

.advantage-card .card-icon {
    margin-bottom: 20px;
}

.advantage-card .icon-emoji {
    font-size: 48px;
    transition: all 0.3s ease;
}

.advantage-card:hover .icon-emoji {
    transform: scale(1.2);
}

.advantage-card h4 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 10px;
}

.advantage-card p {
    color: #6b7280;
    line-height: 1.6;
    margin: 0;
}

/* Cooperation Section */
.cooperation-section {
    padding: 80px 0;
    background: #f9fafb;
}

.cooperation-steps {
    max-width: 600px;
    margin: 0 auto;
}

.cooperation-step {
    display: flex;
    align-items: center;
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
}

.cooperation-step:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
}

.step-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #8b5cf6, #5b21b6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 20px;
    flex-shrink: 0;
}

.step-number {
    color: white;
    font-size: 24px;
    font-weight: 700;
}

.step-content h4 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 5px;
}

.step-content p {
    color: #6b7280;
    margin: 0;
    line-height: 1.5;
}

/* CTA Section */
.cta-section-modern {
    position: relative;
    padding: 80px 0;
    background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    overflow: hidden;
}

.cta-gradient {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
}

.cta-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: min(1180px, 100%);
    margin: 0 auto;
    padding: 0 12px;
    box-sizing: border-box;
}

.cta-icon {
    margin-bottom: 30px;
}

.installation-icon {
    font-size: 64px;
    color: white;
}

@keyframes toolPulse {
    0%, 100% {
        transform: scale(1) rotate(0deg);
        filter: brightness(1);
    }
    50% {
        transform: scale(1.1) rotate(5deg);
        filter: brightness(1.3);
    }
}

.cta-title {
    font-size: clamp(2.2rem, 5.4vw, 3.65rem);
    font-weight: 800;
    color: white;
    margin-bottom: 40px;
    line-height: 1.14;
    max-width: none;
    margin-left: auto;
    margin-right: auto;
    padding: 0 4px;
}

.cta-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn-cta-primary,
.btn-cta-secondary {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 2px solid;
}

.btn-cta-primary {
    background: #8b5cf6;
    color: white;
    border-color: #8b5cf6;
}

.btn-cta-primary:hover {
    background: white;
    color: #8b5cf6;
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(255, 255, 255, 0.3);
}

.btn-cta-secondary {
    background: transparent;
    color: white;
    border-color: rgba(255, 255, 255, 0.5);
}

.btn-cta-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: white;
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2);
}

/* Модальные окна: static/css/styles.css */

/* Animations */
@keyframes animate-tools {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-10deg) scale(1.1); }
    75% { transform: rotate(10deg) scale(1.1); }
}

@keyframes animate-hammer {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.2) rotate(-15deg); }
}

@keyframes animate-exchange {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2) rotateY(180deg); }
}

@keyframes animate-chart {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.1) translateY(-5px); }
}

@keyframes animate-water {
    0%, 100% { transform: scale(1) translateY(0); }
    25% { transform: scale(1.1) translateY(-3px); }
    75% { transform: scale(1.05) translateY(3px); }
}

@keyframes animate-electric {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.3) rotate(10deg); }
}

@keyframes animate-construction {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(5deg); }
}

@keyframes animate-visit {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

@keyframes animate-blueprint {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(-3deg); }
}

@keyframes animate-calculator {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

@keyframes animate-work {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-20deg) scale(1.1); }
    75% { transform: rotate(20deg) scale(1.1); }
}

@keyframes animate-check {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

@keyframes animate-star {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.2) rotate(72deg); }
}

@keyframes animate-target {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

@keyframes animate-document {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.1) translateY(-5px); }
}

@keyframes animate-wrench {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-15deg) scale(1.1); }
    75% { transform: rotate(15deg) scale(1.1); }
}

@keyframes animate-clock {
