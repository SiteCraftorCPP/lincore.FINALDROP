{# full: целое 0–5 (число полных звёзд). aria_label — для скринридеров, напр. «Оценка 5 из 5» #}
<div class="site-reviews__rating" role="img" aria-label="{{ aria_label }}">
    {% for i in "12345"|make_list %}
        {% if forloop.counter <= full %}
            <span class="site-reviews__star site-reviews__star--full" aria-hidden="true"></span>
        {% else %}
            <span class="site-reviews__star site-reviews__star--empty" aria-hidden="true"></span>
        {% endif %}
    {% endfor %}
</div>
