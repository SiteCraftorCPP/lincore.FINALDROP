# Конфигурация Nginx для Engineering Site
# Домен: лин-кор.рф (xn----otbhblio.xn--p1ai)
# IP: 5.129.251.41

# Перенаправление с www на без www (после установки SSL будет обновлено)
server {
    listen 80;
    listen [::]:80;
    server_name www.xn----otbhblio.xn--p1ai www.лин-кор.рф;
    return 301 http://xn----otbhblio.xn--p1ai$request_uri;
}

# Основной сервер
server {
    listen 80;
    listen [::]:80;
    server_name xn----otbhblio.xn--p1ai лин-кор.рф 5.129.251.41;
    
    # Максимальный размер загружаемого файла
    client_max_body_size 20M;
    
    # Кодировка
    charset utf-8;
    
    # Таймауты
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;
    
    # Логи
    access_log /var/log/nginx/engineering_site_access.log;
    error_log /var/log/nginx/engineering_site_error.log;
    
    # Favicon
    location = /favicon.ico { 
        access_log off; 
        log_not_found off;
        alias /home/django/projects/engineering_site/staticfiles/images/favicon-32.ico;
    }
    
    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    
    # Статические файлы
    location /static/ {
        alias /home/django/projects/engineering_site/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }
    
    # Медиа файлы (фотографии и т.д.)
    location /media/ {
        alias /home/django/projects/engineering_site/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
        
        # Безопасность: запрет выполнения скриптов
        location ~* \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
    }
    
    # Прокси для Django приложения
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Заголовки
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Отключаем буферизацию для SSE/Websockets
        proxy_buffering off;
        proxy_redirect off;
        
        # Таймауты
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    
    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Запрет доступа к backup файлам
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

